<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka Streams Click Counter</title>
    <!-- Modern Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary-glow: linear-gradient(135deg, #6366f1, #8b5cf6);
            --accent-glow: linear-gradient(135deg, #3b82f6, #06b6d4);
            --button-glow: 0 0 20px rgba(99, 102, 241, 0.4);
            --button-hover-glow: 0 0 35px rgba(139, 92, 246, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Glow Backgrounds */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            background: var(--container-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #a5b4fc, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #a5b4fc;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            display: flex;
            width: 100%;
            gap: 12px;
        }

        input {
            flex: 1;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .btn-rand {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0 16px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-rand:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Large Click Trigger */
        .click-area {
            position: relative;
            margin: 30px 0;
        }

        .btn-click {
            width: 100%;
            max-width: 280px;
            height: 80px;
            border: none;
            border-radius: 40px;
            background: var(--primary-glow);
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--button-glow);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .btn-click:hover {
            transform: translateY(-2px);
            box-shadow: var(--button-hover-glow);
        }

        .btn-click:active {
            transform: translateY(1px);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        /* Counters Dashboard */
        .dashboard {
            margin-top: 35px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.25);
            background: rgba(255, 255, 255, 0.04);
        }

        .card-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .counter-val {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        /* Users clicks table styling */
        .user-list-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
        }

        .user-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .user-list-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .badge {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .users-table-container {
            max-height: 160px;
            overflow-y: auto;
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 4px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            transition: background 0.2s ease;
        }

        .user-row:last-child {
            border-bottom: none;
        }

        .user-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .user-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .user-val {
            font-weight: 700;
            color: #38bdf8;
        }

        .empty-users {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            padding: 20px 0;
            font-style: italic;
        }

        /* Success alerts popups */
        .toast {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(-10px);
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">Click registered successfully!</div>

    <div class="app-container">
        <h1>Kafka Streams Click Dashboard</h1>
        <p class="subtitle">TP 5 - Real-time Distributed Stream Aggregation</p>

        <!-- User Selection -->
        <div class="input-group">
            <label for="userId">Target User ID</label>
            <div class="input-wrapper">
                <input type="text" id="userId" value="user-1" placeholder="Enter User ID">
                <button class="btn-rand" id="btnGen" onclick="generateRandomUser()">Randomize</button>
            </div>
        </div>

        <!-- Button to trigger click event -->
        <div class="click-area">
            <button class="btn-click" id="btnClick" onclick="sendClickEvent()">
                CLICK HERE TO EVENT
            </button>
        </div>

        <!-- Data Dashboard -->
        <div class="dashboard">
            <!-- Global Click Count -->
            <div class="card">
                <div class="card-title">Total Global Clicks</div>
                <div class="counter-val" id="globalCounter">0</div>
            </div>

            <!-- Clicks per User -->
            <div class="user-list-card">
                <div class="user-list-header">
                    <h3>Clicks per User</h3>
                    <span class="badge" id="userCountBadge">0 active users</span>
                </div>
                <div class="users-table-container" id="usersContainer">
                    <div class="empty-users">No clicks recorded yet. Click above to start!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set context URL dynamically
        const API_URL = "http://localhost:8080/clicks";

        // Generate a random user ID on startup
        function generateRandomUser() {
            const randomId = "user-" + Math.floor(Math.random() * 100);
            document.getElementById("userId").value = randomId;
        }

        // Trigger POST event to send click to Kafka
        async function sendClickEvent() {
            const userId = document.getElementById("userId").value.trim();
            if (!userId) {
                alert("Please enter a User ID first.");
                return;
            }

            const btn = document.getElementById("btnClick");
            btn.disabled = true;
            btn.innerText = "SENDING...";

            try {
                const response = await fetch(`${API_URL}/produce?userId=${encodeURIComponent(userId)}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    showToast(`Click registered for ${userId}!`);
                    // Immediate refresh of data
                    fetchCounts();
                } else {
                    console.error("Failed to send click event.");
                }
            } catch (err) {
                console.error("Error sending click event: ", err);
            } finally {
                btn.disabled = false;
                btn.innerText = "CLICK HERE TO EVENT";
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 2500);
        }

        // Fetch counts from REST api using Interactive Queries endpoints
        async function fetchCounts() {
            try {
                // 1. Fetch Global Click Count
                const globalRes = await fetch(`${API_URL}/count`);
                if (globalRes.ok) {
                    const globalData = await globalRes.json();
                    document.getElementById("globalCounter").innerText = globalData.totalClicks || 0;
                }

                // 2. Fetch Click Counts per User
                const userRes = await fetch(`${API_URL}/count?byUser=true`);
                if (userRes.ok) {
                    const userData = await userRes.json();
                    
                    // Filter out spring configuration keys or errors
                    if (userData.error) {
                        return; // State store not initialized yet
                    }

                    const usersContainer = document.getElementById("usersContainer");
                    const userList = Object.entries(userData).filter(([key]) => key !== "totalClicks");
                    
                    document.getElementById("userCountBadge").innerText = `${userList.length} active users`;

                    if (userList.length === 0) {
                        usersContainer.innerHTML = `<div class="empty-users">No clicks recorded yet. Click above to start!</div>`;
                        return;
                    }

                    // Sort users by name
                    userList.sort((a, b) => a[0].localeCompare(b[0]));

                    let html = '';
                    userList.forEach(([user, count]) => {
                        html += `
                            <div class="user-row">
                                <span class="user-name">${escapeHtml(user)}</span>
                                <span class="user-val">${count} clicks</span>
                            </div>
                        `;
                    });
                    usersContainer.innerHTML = html;
                }
            } catch (err) {
                console.warn("Failed to fetch counts from REST endpoint. Check if the server is running.", err);
            }
        }

        // Simple helper to avoid script injection in username display
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Auto-refresh counters dashboard every 1.5 seconds
        setInterval(fetchCounts, 1500);

        // Initial fetch on page load
        window.onload = () => {
            generateRandomUser();
            fetchCounts();
        };
    </script>
</body>
</html>
